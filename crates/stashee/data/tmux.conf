# Config for the stashee socket only (tmux -L stashee -f this-file).
# The user's own tmux configuration is never touched.

set -g status off
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
setw -g aggressive-resize on
set -g default-terminal "tmux-256color"

# Clipboard rides OSC 52, the same path as SSH panes: tmux emits it
# for its own copy-mode copies and forwards it from applications
# inside ("on" allows both; the "external" default ignores apps), and
# the pane's OSC 52 proxy lifts it to wl-copy/xclip — VTE itself
# silently drops OSC 52. Releasing a mouse selection thus lands in the
# system clipboard, and TUIs that copy on their own (OSC 52) work too.
set -s set-clipboard on

# tmux's yellow selection and message defaults clash with the glass UI;
# match the pane focus tint from data/style.css instead.
set -g mode-style "bg=#3a4f76"
set -g message-style "bg=#3a4f76,fg=#e2e4ea"

# tmux's character-drawn right-click menu has no place inside a GUI app.
unbind -T root MouseDown3Pane
unbind -T root M-MouseDown3Pane
unbind -T copy-mode MouseDown3Pane
unbind -T copy-mode-vi MouseDown3Pane
