name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    # fedora:latest, same as release: the runner's ubuntu image ships
    # GTK 4.8, the gtk4 crate needs >= 4.14. Fedora also packages the
    # whole Rust toolchain, so no rustup download.
    container: fedora:latest
    steps:
      # checkout is a JS action: the container must already have node,
      # and git makes checkout clone instead of the flaky REST download.
      - name: Install toolchain and build dependencies
        run: dnf install -y nodejs git gcc gcc-c++ rust cargo rustfmt clippy gtk4-devel libadwaita-devel vte291-gtk4-devel
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
