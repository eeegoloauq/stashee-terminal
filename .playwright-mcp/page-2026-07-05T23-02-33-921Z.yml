                  - paragraph [ref=e525]: A tiling terminal workspace for Linux.
                  - link "stashee on first launch" [ref=e526] [cursor=pointer]:
                    - /url: /eeegoloauq/stashee-terminal/blob/main/docs/shots/welcome.png
                    - img "stashee on first launch" [ref=e527]
                - paragraph [ref=e528]:
                  - text: Terminals are grouped into named
                  - strong [ref=e529]: workflows
                  - text: and tile automatically. Every pane runs inside a tmux session, so closing the app
                  - strong [ref=e530]: stashes
                  - text: a workflow instead of killing it. Reopen, and every shell is back exactly where it was.
                - generic [ref=e531]:
                  - heading "Why" [level=2] [ref=e532]
                  - 'link "Permalink: Why" [ref=e533] [cursor=pointer]':
                    - /url: "#why"
                    - img [ref=e534]
                - list [ref=e536]:
                  - listitem [ref=e537]: Sessions live in tmux, not in the app. Quitting, crashing, or updating loses nothing; the window is only a client.
                  - listitem [ref=e538]: "No layout management. New panes tile automatically: up to three columns, then rows, always evenly split."
                  - listitem [ref=e539]: SSH panes are stashed too. A pane on a remote host survives reboots and dropped connections, and remote copy lands in the local clipboard.
                  - listitem [ref=e540]: Native. Rust, GTK4, libadwaita, and VTE (the terminal engine behind GNOME Terminal and Ptyxis). No Electron, no webviews, no daemons.
                - paragraph [ref=e541]:
                  - link "three coding agents in a stashed workflow" [ref=e542] [cursor=pointer]:
